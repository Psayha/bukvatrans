version: "3.9"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  # One-shot service: builds the React admin panel and copies dist/ to the
  # shared nginx volume. nginx serves it statically at sb.littera.site.
  admin_panel:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend/admin:/app
      - admin_dist:/var/www/admin
    command: >
      sh -c "npm ci && npm run build && cp -r dist/. /var/www/admin/"
    restart: "no"
    logging: *default-logging

  # One-shot service: builds the React public web app and copies dist/ to the
  # shared nginx volume. nginx serves it at littera.site.
  web_panel:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend/web:/app
      - web_dist:/var/www/web
    command: >
      sh -c "npm ci && npm run build && cp -r dist/. /var/www/web/"
    restart: "no"
    logging: *default-logging

  # One-shot service that runs `alembic upgrade head` and exits. Every
  # long-running service `depends_on: migrate: service_completed_successfully`
  # so app containers never race the schema.
  migrate:
    image: ${BUKVATRANS_IMAGE:-ghcr.io/psayha/bukvatrans:latest}
    pull_policy: missing
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    build: .
    environment:
      ROLE: migrate
    command: alembic upgrade head
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    logging: *default-logging

  bot:
    image: ${BUKVATRANS_IMAGE:-ghcr.io/psayha/bukvatrans:latest}
    pull_policy: missing
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    build: .
    environment:
      ROLE: bot
    command: python -m src.bot.main
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Liveness: the bot process must be up. aiogram polling keeps a coroutine
    # running; if it crashes the whole container exits and restart kicks in.
    # `pgrep` against our own command is the cheapest probe.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'src.bot.main' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  worker:
    image: ${BUKVATRANS_IMAGE:-ghcr.io/psayha/bukvatrans:latest}
    pull_policy: missing
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    build: .
    environment:
      ROLE: worker
    command: celery -A src.worker.app worker -Q transcription -n transcription@%h --loglevel=info --concurrency=8
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    # stop_grace_period must be >= CELERY_TIME_LIMIT (2100s) + worker_shutdown_timeout buffer
    # so a 35-minute transcription can finish instead of being SIGKILL'd on deploy.
    stop_grace_period: 2400s
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.worker.app inspect ping -d transcription@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging: *default-logging

  worker_summary:
    image: ${BUKVATRANS_IMAGE:-ghcr.io/psayha/bukvatrans:latest}
    pull_policy: missing
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    build: .
    environment:
      ROLE: worker_summary
    command: celery -A src.worker.app worker -Q summary -n summary@%h --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 300s
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.worker.app inspect ping -d summary@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging: *default-logging

  worker_maintenance:
    image: ${BUKVATRANS_IMAGE:-ghcr.io/psayha/bukvatrans:latest}
    pull_policy: missing
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    build: .
    environment:
      ROLE: worker_maintenance
    command: celery -A src.worker.app worker -Q maintenance -n maintenance@%h --loglevel=info --concurrency=1
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.worker.app inspect ping -d maintenance@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging: *default-logging

  beat:
    image: ${BUKVATRANS_IMAGE:-ghcr.io/psayha/bukvatrans:latest}
    pull_policy: missing
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    build: .
    environment:
      ROLE: beat
    command: celery -A src.worker.app beat --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # `beat` writes a schedule file periodically — if the process is alive
    # the file gets touched. pgrep on the beat cmdline is enough.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  api:
    image: ${BUKVATRANS_IMAGE:-ghcr.io/psayha/bukvatrans:latest}
    pull_policy: missing
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    build: .
    environment:
      ROLE: api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    # No public port — nginx fronts the API.
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - admin_panel
      - web_panel
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - letsencrypt_certs:/etc/letsencrypt:ro
      - letsencrypt_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
      - admin_dist:/var/www/admin:ro
      - web_dist:/var/www/web:ro
    # Substitute ${DOMAIN} into the template at container start.
    # List-form so docker-compose passes the -c argument as one string
    # (string-form YAML splits on whitespace and breaks the &&).
    command:
      - /bin/sh
      - -c
      - "envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    restart: unless-stopped
    logging: *default-logging

  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - letsencrypt_www:/var/www/certbot
    # Check for renewal every 12h. Certbot only renews certs within 30d of expiry.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet && sleep 12h & wait $${!}; done'
    restart: unless-stopped
    logging: *default-logging

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transcribe_bot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d transcribe_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  db_backup:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: bot
      POSTGRES_DB: transcribe_bot
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_HOUR_UTC: ${BACKUP_HOUR_UTC:-3}
    volumes:
      - ./scripts/db_backup.sh:/usr/local/bin/db_backup.sh:ro
      - ./scripts/db_backup_loop.sh:/usr/local/bin/db_backup_loop.sh:ro
      - db_backups:/backups
    # Busybox-compatible loop: sleep until the next `$BACKUP_HOUR_UTC`:00 UTC,
    # run the dump, repeat. No GNU-style `date -d` involved.
    entrypoint: ["/bin/sh", "/usr/local/bin/db_backup_loop.sh"]
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # Auto-deploy: polls ghcr.io for a new `:latest` tag every 60s and
  # gracefully restarts containers with the same labels/env. CI just
  # pushes the image — this watcher is the deploy trigger on the VPS.
  #
  # Auth: Watchtower reads ~/.docker/config.json mounted from the host.
  # On first deploy run `docker login ghcr.io -u <github_user> -p <PAT>`
  # so the file exists. The PAT only needs `read:packages`.
  watchtower:
    # Floating `latest` instead of a pinned 1.7.1 — older tags shipped a
    # Docker client that negotiates API 1.25, which modern daemons reject
    # ("client version is too old"). `latest` uses a recent engine client.
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    environment:
      # Pin the API version the client uses when talking to the host docker.
      # Host is Docker 24+, any 1.41+ negotiates cleanly.
      DOCKER_API_VERSION: "1.43"
      WATCHTOWER_POLL_INTERVAL: "60"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
    # Only watches containers labelled `com.centurylinklabs.watchtower.enable=true`.
    # Set on each app service via the labels block; nginx/db/redis stay pinned.
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  db_backups:
  letsencrypt_certs:
  letsencrypt_www:
  nginx_logs:
  admin_dist:
  web_dist:
