worker_processes auto;
events { worker_connections 1024; }

# Bootstrap config: HTTP only on :80, enough to satisfy the Let's Encrypt
# http-01 challenge. Used once during first deploy; swap to nginx.conf
# after certificates are issued.
http {
    server_tokens off;

    server {
        listen 80 default_server;
        server_name _;

        # Certbot writes challenge files here via --webroot -w /var/www/certbot.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else: 404. This server does not serve real traffic.
        location / {
            return 404;
        }
    }
}
