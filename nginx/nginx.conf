worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    client_max_body_size 600M;   # allow large audio/video uploads via web
    client_body_timeout 300s;
    client_header_timeout 10s;
    send_timeout 60s;
    keepalive_timeout 65s;

    limit_req_zone $binary_remote_addr zone=tg_webhook:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=yk_webhook:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=health:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent"'
        '}';
    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    upstream app {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect (main domain + admin subdomain) ──────────────
    server {
        listen 80;
        server_name ${DOMAIN} sb.${DOMAIN};

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main domain (API + future web app) ─────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name ${DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Telegram webhook
        location = /webhooks/telegram {
            limit_req zone=tg_webhook burst=100 nodelay;
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
            proxy_read_timeout 30s;
        }

        # YuKassa webhook
        location = /webhooks/yukassa {
            limit_req zone=yk_webhook burst=20 nodelay;
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $http_x_request_id;
            proxy_set_header X-YooKassa-Signature $http_x_yookassa_signature;
            proxy_read_timeout 30s;
        }

        # Metrics (internal only)
        location = /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://app;
        }

        location = /health {
            limit_req zone=health burst=10 nodelay;
            proxy_pass http://app;
            proxy_read_timeout 10s;
            access_log off;
        }

        # Public API
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            # Required for large file uploads
            proxy_request_buffering off;
            client_max_body_size 600M;
        }

        # Public web app (React SPA)
        root /var/www/web;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ── Admin panel (sb.littera.site) ───────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name sb.${DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        root /var/www/admin;
        index index.html;

        # SPA routing — fall back to index.html for client-side routes.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Admin API proxy (so the SPA talks to /api/... on same origin).
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
